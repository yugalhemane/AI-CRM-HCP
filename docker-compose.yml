services:
  postgres:
    image: postgres:16
    container_name: hcp_crm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - hcp_crm_pgdata:/var/lib/postgresql/data

volumes:
  hcp_crm_pgdata:
